name: Build & Publish Docker Image

# 构建 jiasongji/chatui 多架构镜像并发布到 Docker Hub。
# 触发条件：
#   - push 到 main（仅当构建相关文件变化时）
#   - 打 v* tag（如 v1.1.0）→ 同时发布 latest、版本号、SHA
#   - 手动 workflow_dispatch
#
# 需要在仓库 Settings → Secrets 配置：
#   DOCKERHUB_USERNAME - Docker Hub 用户名（jiasongji）
#   DOCKERHUB_TOKEN    - Docker Hub Access Token（需具备 Read/Write 权限）

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - app/**
      - components/**
      - lib/**
      - prisma/**
      - scripts/**
      - public/**
      - package.json
      - package-lock.json
      - next.config.mjs
      - postcss.config.mjs
      - tailwind.config.ts
      - tsconfig.json
      - .github/workflows/docker-publish.yml
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: jiasongji/chatui
          # tag 生成规则：
          #   - 始终打 type=raw=latest（跟随 main 最新）
          #   - 始终打 git short SHA（便于回溯）
          #   - 打 v* tag 时打语义化版本（v1.2.3 → 1.2.3, 1.2, 1）
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ !github.event.repository.fork }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.repository.fork == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        if: always()
        run: |
          echo "## Docker 镜像发布结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "✅ 构建并推送成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**平台:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**服务器更新命令:**" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "docker compose pull && docker compose up -d" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 构建失败，请检查日志" >> $GITHUB_STEP_SUMMARY
          fi
