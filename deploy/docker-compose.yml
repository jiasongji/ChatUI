# ChatUI - 一条命令部署
# 使用方法：
#   1. 复制 .env.example 为 .env，填入你的配置
#   2. docker compose up -d
#   3. 访问 http://localhost:3000

services:
  chatui:
    image: jiasongji/chatui:latest
    container_name: chatui
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

# 如果 AI API 也在 Docker 中运行（如 CLIProxyAPI），取消下方注释并修改 OPENAI_BASE_URL 为 http://cliproxyapi:8317/v1
# networks:
#   default:
#     name: ai-net
#     external: true
