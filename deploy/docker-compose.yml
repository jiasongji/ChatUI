# ChatUI - 一条命令部署（拉取预构建镜像）
#
# 使用方法：
#   1. 复制 .env.example 为 .env，填入你的配置
#   2. docker compose up -d
#   3. 访问 http://localhost:3000
#
# 镜像 jiasongji/chatui:latest 由 GitHub Actions 自动构建发布，无需本地编译。
#
# 网络说明：默认端口映射 3000:3000，AI 提供商经公网访问即可。
# 若 AI 提供商是同主机容器且 bridge 出站受限（如 UFW / daemon.json iptables:false），
# 可改用 host 网络：删掉 ports，加 network_mode: host，并用 PORT 环境变量指定监听端口。

services:
  chatui:
    image: jiasongji/chatui:latest
    container_name: chatui
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
