# ChatUI - Docker Compose（拉取预构建镜像模式）
#
# 镜像由 GitHub Actions 自动构建并发布到 Docker Hub：jiasongji/chatui:latest
# 服务器无需本地编译，docker-compose pull && docker-compose up -d 即可秒级更新。
#
# 这是通用部署配置（3000:3000）。
# 阿里云服务器专用配置见 docker-compose.server.yml（30010:3000 + ai-net）。

services:
  chatui:
    image: jiasongji/chatui:latest
    pull_policy: always
    container_name: chatui
    restart: unless-stopped
    ports:
      - "${CHATUI_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
